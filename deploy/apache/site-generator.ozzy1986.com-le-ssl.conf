<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName site-generator.ozzy1986.com
    AddDefaultCharset UTF-8
    DocumentRoot /var/www/site-generator.ozzy1986.com/generated_site

    <Directory /var/www/site-generator.ozzy1986.com/generated_site>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /generate http://127.0.0.1:5050/generate
    ProxyPassReverse /generate http://127.0.0.1:5050/generate
    ProxyPass /download-site http://127.0.0.1:5050/download-site
    ProxyPassReverse /download-site http://127.0.0.1:5050/download-site
    ProxyPass /admin http://127.0.0.1:5050/
    ProxyPassReverse /admin http://127.0.0.1:5050/

    ErrorLog ${APACHE_LOG_DIR}/site-generator_error.log
    CustomLog ${APACHE_LOG_DIR}/site-generator_access.log combined

    SSLCertificateFile /etc/letsencrypt/live/site-generator.ozzy1986.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/site-generator.ozzy1986.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
