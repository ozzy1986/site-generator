<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff006e"/>
      <stop offset="50%" stop-color="#8338ec"/>
      <stop offset="100%" stop-color="#3a86ff"/>
    </linearGradient>
    <radialGradient id="eg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffbe0b"/>
      <stop offset="100%" stop-color="#fb5607"/>
    </radialGradient>
  </defs>

  <!-- Background blob -->
  <circle cx="16" cy="16" r="15" fill="url(#fg)"/>

  <!-- Cracked eye -->
  <ellipse cx="16" cy="14" rx="9" ry="7" fill="url(#eg)" stroke="#1a1a2e" stroke-width="1.2"/>
  <circle cx="16" cy="14" r="3.5" fill="#1a1a2e"/>
  <circle cx="17" cy="13" r="1.2" fill="#fff"/>

  <!-- Mini d-pad pupil cross -->
  <path d="M15 13.2 v-2.4 h2 v2.4 h2.4 v2 h-2.4 v2.4 h-2 v-2.4 h-2.4 v-2Z"
        fill="#8338ec" opacity="0.5"/>

  <!-- Tiny tentacles -->
  <g stroke-linecap="round" fill="none" stroke-width="2" opacity="0.8">
    <path d="M6 24 Q2 28 5 31" stroke="#06d6a0"/>
    <path d="M26 24 Q30 28 27 31" stroke="#ff006e"/>
    <path d="M16 25 Q16 29 14 32" stroke="#3a86ff"/>
  </g>
</svg>
