<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ seo.title }}</title>
    <meta name="description" content="{{ seo.description }}">
    <meta name="keywords" content="{{ seo.keywords }}">
    <meta name="robots" content="{{ seo.robots }}">
    <link rel="canonical" href="{{ seo.canonical_url }}">
    <meta property="og:title" content="{{ seo.og_title }}">
    <meta property="og:description" content="{{ seo.og_description }}">
    <meta property="og:url" content="{{ seo.og_url }}">
    <meta property="og:image" content="{{ seo.og_image }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ site_name }}">
    <meta property="og:locale" content="ru_RU">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/styles.css">
    <script type="application/ld+json">{{ jsonld|safe }}</script>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="logo-link">
                <img src="/assets/logo.svg" alt="{{ site_name }}" class="logo" width="56" height="56">
                <span class="logo-text">{{ site_name }}</span>
            </a>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>
                Данные предоставляет
                <a href="https://pandascore.co" rel="noopener noreferrer" target="_blank">PandaScore</a>.
                Сайт собирается статически и обновляется ежедневно.
            </p>
        </div>
    </footer>
</body>
</html>
